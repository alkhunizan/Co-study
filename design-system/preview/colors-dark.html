<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
body { background:#0E1218; color:#ECE6D8; padding: 24px; position: relative; overflow: hidden; }
body::before {
  content:''; position: absolute; inset-block-start: -40px; inset-inline-end: -40px; width: 240px; height: 240px;
  background: radial-gradient(circle, rgba(229,182,140,0.28) 0%, transparent 65%);
  pointer-events: none;
}
.note { position: absolute; top: 18px; inset-inline-start: 28px; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color:#E5B68C; font-weight: 600; }
.row1, .row2 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; position: relative; }
.row1 { margin: 36px 0 12px; }
.sw { height: 78px; border-radius: 14px; padding: 10px 12px; display: flex; flex-direction: column; justify-content: flex-end; border: 1px solid rgba(255,255,255,0.05); color: #ECE6D8; }
.sw .n { font-size: 12px; font-weight: 600; }
.sw .h { font-family: var(--font-mono); font-size: 10.5px; opacity: 0.65; margin-top: 2px; }
.sw .v { font-family: var(--font-mono); font-size: 9.5px; opacity: 0.5; }
</style></head><body>
<div class="note">Gulf night sky × warm lamp</div>
<div class="row1">
  <div class="sw" style="background:#0E1218"><div class="n">Paper</div><div class="h">#0E1218</div><div class="v">--paper</div></div>
  <div class="sw" style="background:#141923"><div class="n">Paper 2</div><div class="h">#141923</div><div class="v">--paper-2</div></div>
  <div class="sw" style="background:#1B2230"><div class="n">Card</div><div class="h">#1B2230</div><div class="v">--card</div></div>
  <div class="sw" style="background:#161C27"><div class="n">Inset</div><div class="h">#161C27</div><div class="v">--inset</div></div>
  <div class="sw" style="background:#242D3B"><div class="n">Line</div><div class="h">#242D3B</div><div class="v">--line</div></div>
</div>
<div class="row2">
  <div class="sw" style="background:#E5B68C;color:#0E1218"><div class="n">Accent · lamp</div><div class="h">#E5B68C</div><div class="v">--accent</div></div>
  <div class="sw" style="background:rgba(229,182,140,0.18);color:#F5D2B5"><div class="n">Accent glow</div><div class="h">rgba(...0.28)</div><div class="v">--accent-glow</div></div>
  <div class="sw" style="background:#7AA681;color:#0E1218"><div class="n">Success</div><div class="h">#7AA681</div><div class="v">--success</div></div>
  <div class="sw" style="background:#D77968;color:#0E1218"><div class="n">Danger</div><div class="h">#D77968</div><div class="v">--danger</div></div>
  <div class="sw" style="background:#E0B872;color:#0E1218"><div class="n">Warn</div><div class="h">#E0B872</div><div class="v">--warn</div></div>
</div>
</body></html>
