<!doctype html lang="ar" dir="rtl"><html lang="ar" dir="rtl"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
body { padding: 24px 28px; direction: rtl; font-family: var(--font-body-ar); }
.eyebrow { font-size: 11px; letter-spacing: 0; font-weight: 700; color: var(--accent-2); margin-bottom: 12px; font-family: var(--font-body-ar); }
.row { display: flex; gap: 28px; align-items: flex-start; }
.col1 { flex: 1; }
.col2 { flex: 0 0 220px; border-inline-start: 1px solid var(--line); padding-inline-start: 24px; }
.display { font-family: var(--font-display-ar); font-size: 44px; font-weight: 700; line-height: 1.15; color: var(--ink); margin-bottom: 10px; }
.body { font-family: var(--font-body-ar); font-size: 17px; line-height: 1.8; color: var(--ink-2); }
.specimen { font-family: var(--font-body-ar); font-size: 56px; font-weight: 900; line-height: 1; color: var(--ink); }
.weights { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; font-family: var(--font-body-ar); }
.weights span { font-size: 16px; color: var(--ink); }
.num { font-family: var(--font-mono); }
</style></head><body>
<div class="eyebrow">عربي · أميري للعنوان · طجوال للنص</div>
<div class="row">
  <div class="col1">
    <div class="display">غرفة مذاكرة هادئة، مفتوحة لك دائماً.</div>
    <div class="body">ادخل، الكاميرا شغّالة، اشتغل مع غيرك. لا محاضرة، ولا اجتماع، ولا توقّعات — فقط ناس يذاكرون في نفس الغرفة معك.</div>
  </div>
  <div class="col2">
    <div class="specimen">هلا</div>
    <div class="weights">
      <span style="font-weight:400">طجوال ٤٠٠</span>
      <span style="font-weight:500">٥٠٠</span>
      <span style="font-weight:700">٧٠٠</span>
      <span style="font-weight:900">٩٠٠</span>
      <span class="num" style="font-weight:600">٠١٢٣٤٥٦٧٨٩</span>
    </div>
  </div>
</div>
</body></html>
