<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
body { padding: 24px 28px; }
.eyebrow { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600; color: var(--accent-2); margin-bottom: 14px; }
.row { display: flex; gap: 28px; align-items: flex-start; }
.col1 { flex: 1; }
.col2 { flex: 0 0 220px; border-inline-start: 1px solid var(--line); padding-inline-start: 24px; }
.h3 { font-family: var(--font-body); font-size: 18px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
.body { font-family: var(--font-body); font-size: 16px; line-height: 1.6; color: var(--ink-2); margin-bottom: 12px; }
.caption { font-size: 13px; color: var(--ink-3); }
.specimen { font-family: var(--font-body); font-size: 56px; font-weight: 800; line-height: 1; letter-spacing: -0.02em; color: var(--ink); }
.weights { display: flex; flex-direction: column; gap: 6px; font-family: var(--font-body); }
.weights span { font-size: 15px; color: var(--ink); }
</style></head><body>
<div class="eyebrow">Body · Inter</div>
<div class="row">
  <div class="col1">
    <div class="h3">Drop in. Camera on. Work alongside someone.</div>
    <div class="body">Halastudy is a quiet study room you can join 24/7. No instructor, no meeting, no expectations — just other people working in the same room as you.</div>
    <div class="caption">Caption · 13px · ink-2</div>
  </div>
  <div class="col2">
    <div class="specimen">Aa</div>
    <div class="weights" style="margin-top:10px">
      <span style="font-weight:400">Regular 400</span>
      <span style="font-weight:500">Medium 500</span>
      <span style="font-weight:600">Semibold 600</span>
      <span style="font-weight:700">Bold 700</span>
      <span style="font-weight:800">Black 800</span>
    </div>
  </div>
</div>
</body></html>
