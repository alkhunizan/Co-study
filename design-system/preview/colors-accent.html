<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
body { padding: 24px; }
.wrap { display: flex; gap: 16px; align-items: stretch; }
.hero { flex: 0 0 280px; height: 200px; border-radius: 24px;
  background: radial-gradient(120% 90% at 30% 30%, #F2C19A 0%, #E0B08B 45%, #C28A62 100%);
  position: relative; display: flex; align-items: flex-end; padding: 22px;
  box-shadow: 0 30px 80px -10px rgba(224,176,139,0.45), 0 6px 18px rgba(28,24,20,0.08);
  color: #2D1A0A; font-family: var(--font-display); font-size: 28px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.05;
}
.hero .tag { position: absolute; top: 18px; inset-inline-start: 22px; font-family: var(--font-body); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600; color: #6B3F18; }
.scale { flex: 1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.sw { height: 92px; border-radius: 16px; padding: 10px 12px; display: flex; flex-direction: column; justify-content: flex-end; border: 1px solid rgba(28,24,20,0.06); }
.sw .n { font-size: 12px; font-weight: 600; }
.sw .h { font-family: var(--font-mono); font-size: 10.5px; opacity: 0.65; margin-top: 2px; }
.sw .v { font-family: var(--font-mono); font-size: 9.5px; opacity: 0.5; }
.sw.glow { background: rgba(224,176,139,0.30); color: #2D1A0A; }
.sw.soft { background: rgba(224,176,139,0.12); color: #2D1A0A; }
.sw.a   { background: #E0B08B; color: #2D1A0A; }
.sw.a2  { background: #C28A62; color: #F8F3ED; }
.sw.a3  { background: #A56B43; color: #F8F3ED; }
.sw.ink { background: #2D3436; color: #F8F3ED; }
</style></head><body>
<div class="wrap">
  <div class="hero"><span class="tag">Karak amber</span>Hala<br>هلا</div>
  <div class="scale">
    <div class="sw soft"><div class="n">Accent soft</div><div class="h">rgba(...0.12)</div><div class="v">--accent-soft</div></div>
    <div class="sw glow"><div class="n">Accent glow</div><div class="h">rgba(...0.30)</div><div class="v">--accent-glow</div></div>
    <div class="sw a"><div class="n">Accent</div><div class="h">#E0B08B</div><div class="v">--accent</div></div>
    <div class="sw a2"><div class="n">Accent 2</div><div class="h">#C28A62</div><div class="v">--accent-2 · press</div></div>
    <div class="sw a3"><div class="n">Accent 3</div><div class="h">#A56B43</div><div class="v">--accent-3 · small text</div></div>
    <div class="sw ink"><div class="n">Ink on accent</div><div class="h">#2D3436</div><div class="v">on-accent contrast</div></div>
  </div>
</div>
</body></html>
