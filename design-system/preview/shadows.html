<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
body { padding: 28px 32px; background: var(--paper); }
.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 22px; }
.cell { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.box { width: 100px; height: 100px; border-radius: 20px; background: var(--card); border: 1px solid var(--line); }
.b1 { box-shadow: var(--sh-1); }
.b2 { box-shadow: var(--sh-2); }
.b3 { box-shadow: var(--sh-3); }
.b4 { box-shadow: var(--sh-4); }
.b5 { box-shadow: var(--sh-lamp); border-color: transparent; background: var(--accent); }
.lbl { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-2); text-align: center; line-height: 1.5; }
.lbl b { color: var(--ink); display: block; font-family: var(--font-body); font-weight: 600; font-size: 12px; }
</style></head><body>
<div class="grid">
  <div class="cell"><div class="box b1"></div><div class="lbl"><b>sh-1</b>resting card</div></div>
  <div class="cell"><div class="box b2"></div><div class="lbl"><b>sh-2</b>raised pill</div></div>
  <div class="cell"><div class="box b3"></div><div class="lbl"><b>sh-3</b>floating card</div></div>
  <div class="cell"><div class="box b4"></div><div class="lbl"><b>sh-4</b>modal</div></div>
  <div class="cell"><div class="box b5"></div><div class="lbl"><b>sh-lamp</b>primary CTA glow</div></div>
</div>
</body></html>
