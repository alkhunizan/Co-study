<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.pair { display: flex; flex-direction: column; gap: 6px; }
.bar { height: 56px; border-radius: 14px; display: flex; align-items: center; gap: 10px; padding: 0 16px; }
.bar .dot { width: 10px; height: 10px; border-radius: 50%; }
.bar .lbl { font-weight: 600; font-size: 13px; }
.bar .hex { font-family: var(--font-mono); font-size: 11px; margin-left: auto; opacity: 0.65; }
.soft { height: 28px; border-radius: 10px; display: flex; align-items: center; padding: 0 12px; font-size: 11.5px; font-family: var(--font-mono); }
.success { background:#5A8C5C; color:#fff; }
.danger  { background:#C75545; color:#fff; }
.warn    { background:#D4A256; color:#2D1A0A; }
.info    { background:#6C8FAD; color:#fff; }
.s-success { background: rgba(90,140,92,0.14); color:#3F6A41; }
.s-danger  { background: rgba(199,85,69,0.14); color:#8B3D31; }
.s-warn    { background: rgba(212,162,86,0.18); color:#7A5A2A; }
.s-info    { background: rgba(108,143,173,0.16); color:#3F5E78; }
.prios { display: flex; gap: 8px; margin-top: 14px; }
.prio { flex: 1; padding: 10px 12px; border-radius: 12px; background: var(--card); border: 1px solid var(--line); display: flex; align-items: center; gap: 8px; font-size: 12px; }
.prio .b { width: 4px; height: 22px; border-radius: 2px; }
</style></head><body>
<div class="grid">
  <div class="pair"><div class="bar success"><span class="dot" style="background:#fff;opacity:.6"></span><span class="lbl">Success</span><span class="hex">#5A8C5C</span></div><div class="soft s-success">var(--success-soft)</div></div>
  <div class="pair"><div class="bar danger"><span class="dot" style="background:#fff;opacity:.6"></span><span class="lbl">Danger</span><span class="hex">#C75545</span></div><div class="soft s-danger">var(--danger-soft)</div></div>
  <div class="pair"><div class="bar warn"><span class="dot" style="background:#2D1A0A;opacity:.5"></span><span class="lbl">Warn</span><span class="hex">#D4A256</span></div><div class="soft s-warn">var(--warn-soft)</div></div>
  <div class="pair"><div class="bar info"><span class="dot" style="background:#fff;opacity:.6"></span><span class="lbl">Info</span><span class="hex">#6C8FAD</span></div><div class="soft s-info">var(--info-soft)</div></div>
</div>
<div class="prios">
  <div class="prio"><span class="b" style="background:#C75545"></span>High priority<span style="margin-left:auto;color:var(--ink-3);font-family:var(--font-mono)">#C75545</span></div>
  <div class="prio"><span class="b" style="background:#D4A256"></span>Medium priority<span style="margin-left:auto;color:var(--ink-3);font-family:var(--font-mono)">#D4A256</span></div>
  <div class="prio"><span class="b" style="background:#7AA681"></span>Low priority<span style="margin-left:auto;color:var(--ink-3);font-family:var(--font-mono)">#7AA681</span></div>
</div>
</body></html>
