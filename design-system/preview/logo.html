<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
body { padding: 28px 32px; background: var(--paper); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.wrap { display: flex; flex-direction: column; align-items: center; gap: 26px; width: 100%; }
.lockup { display: flex; align-items: baseline; gap: 14px; }
.h { font-family: 'Newsreader', serif; font-weight: 600; font-size: 64px; letter-spacing: -0.025em; color: var(--ink); line-height: 1; }
.h em { font-style: italic; font-weight: 500; color: var(--accent-3); }
.h .dot { color: var(--accent-2); }
.ar { font-family: 'Amiri', serif; font-weight: 700; font-size: 56px; color: var(--accent-3); line-height: 1; direction: rtl; }
.divider { width: 2px; height: 48px; background: var(--line-strong); }
.tag { font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--ink-2); font-weight: 600; font-family: var(--font-body); }
.alt { display: flex; gap: 28px; padding: 14px 20px; background: var(--card); border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--sh-1); align-items: center; }
.mono { font-family: 'Newsreader', serif; font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
.mono em { font-style: italic; color: var(--accent-3); }
.glyph { width: 44px; height: 44px; border-radius: 12px; background: var(--accent); color: var(--ink); display: inline-flex; align-items: center; justify-content: center; font-family: 'Newsreader', serif; font-size: 24px; font-weight: 700; }
</style></head><body>
<div class="wrap">
  <span class="tag">Wordmark · v1</span>
  <div class="lockup">
    <span class="h">Hala<em>study</em><span class="dot">.</span></span>
    <span class="divider"></span>
    <span class="ar">هلا</span>
  </div>
  <div class="alt">
    <span class="glyph">H</span>
    <span class="mono">Hala<em>study</em></span>
    <span style="color:var(--ink-3);font-size:11px;font-family:var(--font-mono);">favicon · 24/32/64</span>
  </div>
</div>
</body></html>
