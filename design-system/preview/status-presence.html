<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
body { padding: 22px 24px; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.tile { background: var(--card); border: 1px solid var(--line); border-radius: 20px; padding: 16px; display: flex; flex-direction: column; gap: 10px; box-shadow: var(--sh-1); }
.row { display: flex; align-items: center; gap: 10px; }
.avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent-soft); color: var(--accent-3); display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-family: var(--font-display); font-size: 16px; position: relative; flex-shrink: 0; }
.avatar::after { content:''; position:absolute; inset-block-end: -1px; inset-inline-end: -1px; width: 10px; height: 10px; border-radius: 50%; background: var(--success); border: 2px solid var(--card); }
.avatar.away::after { background: var(--ink-3); }
.avatar.busy::after { background: var(--danger); }
.name { font-size: 13.5px; font-weight: 600; color: var(--ink); }
.sub { font-size: 12px; color: var(--ink-2); }
.dot { width: 8px; height: 8px; border-radius: 50%; }
.live { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; background: var(--danger-soft); color: #8B3D31; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; }
.live .dot { background: var(--danger); animation: pulse 1.6s infinite; }
@keyframes pulse { 0%,100% { opacity:1 } 50% { opacity: 0.4 } }
.streak { font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-2); font-feature-settings: "lnum" 0; }
</style></head><body>
<div class="grid">
  <div class="tile">
    <div class="row"><div class="avatar">N</div><div><div class="name">Nora · نورة</div><div class="sub">Focusing · 22 min</div></div></div>
    <div class="row"><span class="live"><span class="dot"></span>LIVE</span><span class="streak">٧ days · streak</span></div>
  </div>
  <div class="tile">
    <div class="row"><div class="avatar away">A</div><div><div class="name">Abdulaziz</div><div class="sub">On break · 3 min left</div></div></div>
    <div class="row"><span class="streak">Pomodoro #4 · today</span></div>
  </div>
  <div class="tile">
    <div class="row"><div class="avatar busy">L</div><div><div class="name">Layan · ليان</div><div class="sub">Camera off</div></div></div>
    <div class="row"><span class="streak" style="color:var(--ink-3)">Joined 11:42pm</span></div>
  </div>
  <div class="tile" style="border-style: dashed; background: transparent; box-shadow: none; align-items: center; justify-content: center; text-align: center;">
    <div class="sub" style="color: var(--ink-3); font-size: 13px; max-width: 160px;">Open seat · share the room code to invite</div>
  </div>
</div>
</body></html>
