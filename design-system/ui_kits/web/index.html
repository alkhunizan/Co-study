<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Halastudy · Web UI Kit</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    html, body { margin: 0; padding: 0; background: var(--paper); }
    body { font-family: var(--font-body); color: var(--ink); }
    html[lang="ar"] body { font-family: var(--font-body-ar); }
    button { font-family: inherit; }
    @keyframes hcPulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.35 } }
    /* Scrollbars — quiet */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 999px; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="Lang.jsx"></script>
  <script type="text/babel" src="Components.jsx"></script>
  <script type="text/babel" src="Landing.jsx"></script>
  <script type="text/babel" src="Room.jsx"></script>
  <script type="text/babel">
    function App() {
      const [screen, setScreen] = React.useState('landing'); // landing | room
      const [room, setRoom] = React.useState(null);
      return (
        <LangProvider>
          {screen === 'landing'
            ? <Landing onEnterRoom={(r)=>{ setRoom(r); setScreen('room'); }}/>
            : <Room room={room} onLeave={()=>setScreen('landing')}/>}
        </LangProvider>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
