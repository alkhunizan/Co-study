<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Halastudy wordmark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,600;1,500&family=Amiri:wght@700&display=swap" rel="stylesheet">
<style>
  body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #F5F2EB; font-family: 'Newsreader', serif; }
  .mark { font-size: 96px; font-weight: 600; letter-spacing: -0.025em; color: #2D3436; line-height: 1; display: flex; align-items: baseline; gap: 22px; }
  .mark em { font-style: italic; color: #A56B43; font-weight: 500; }
  .ar { font-family: 'Amiri', serif; font-weight: 700; color: #A56B43; font-size: 80px; direction: rtl; }
  .div { width: 2px; height: 64px; background: #C7B9A4; align-self: center; }
</style></head>
<body>
  <div class="mark">
    <span>Hala<em>study</em><span style="color:#C28A62">.</span></span>
    <span class="div"></span>
    <span class="ar">هلا</span>
  </div>
</body></html>
